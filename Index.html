function searchPins(q) {
  const ql = q.toLowerCase().trim();
  if (!ql) return [];
  return PIN_DB.map(p => {
    let s = 0;
    const nl = p.name.toLowerCase(), sl = p.series.toLowerCase();
    if (nl === ql) s += 100; else if (nl.startsWith(ql)) s += 50; else if (nl.includes(ql)) s += 30;
    if (sl.includes(ql)) s += 20;
    p.tags.forEach(t => { if (t === ql) s += 40; else if (t.startsWith(ql)) s += 20; else if (t.includes(ql)) s += 10; });
    return {...p, score:s};
  }).filter(p => p.score > 0).sort((a,b) => b.score - a.score).slice(0, 8);
}

  pins: [], wishlist: [],
  activeTab: "collection",
  syncStatus: "connecting",
  showForm: false, showSearch: false, showWishSearch: false,
  editing: null, prefill: null,
  search: "", filterRarity: "All", filterSeries: "All",
  formData: null,
  searchQuery: "", searchResults: [], searchSelected: null,
  unsub: [],
};

let nextId = Date.now();
function genId() { return "pin_" + (nextId++); }

// ── Firebase ──────────────────────────────────────────────────────────────────
function subscribeUser(user) {
  state.unsub.forEach(u => u());
  state.unsub = [];
  state.syncStatus = "connecting";
  render();

  const pinsQ = query(collection(db, "pins"), where("owner", "==", user));
  const wishQ = query(collection(db, "wishlist"), where("owner", "==", user));

  const u1 = onSnapshot(pinsQ, snap => {
    state.pins = snap.docs.map(d => ({id: d.id, ...d.data()}));
    state.syncStatus = "synced";
    render();
  }, () => { state.syncStatus = "error"; render(); });

  const u2 = onSnapshot(wishQ, snap => {
    state.wishlist = snap.docs.map(d => ({id: d.id, ...d.data()}));
    render();
  });

  state.unsub = [u1, u2];
}

async function savePin(pin, collectionName) {
  const {id, ...data} = pin;
  await setDoc(doc(db, collectionName, id), {...data, owner: state.user});
}

async function removePin(id, collectionName) {
  await deleteDoc(doc(db, collectionName, id));
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const root = document.getElementById("root");
  if (!root) return;
  if (state.screen === "profile") { root.innerHTML = renderProfileScreen(); bindProfileEvents(); }
  else { root.innerHTML = renderApp(); bindAppEvents(); }
}

}

function bindProfileEvents() {

    btn.addEventListener("click", () => {
      const user = btn.dataset.user;
      state.user = user;
      state.screen = "collection";
      state.pins = [];
      state.wishlist = [];
      state.syncStatus = "connecting";
      localStorage.setItem("pinapp_lastuser", user);
      subscribeUser(user);
      render();

  document.getElementById("show-add-profile")?.addEventListener("click", () => {

        <button id="confirm-add-profile" style="padding:12px 18px;border-radius:12px;border:none;background:#4e9af1;color:white;font-family:'Fredoka One',cursive;font-size:15px;">Add</button>
        <button id="cancel-add-profile" style="padding:12px 14px;border-radius:12px;border:none;background:#eee;color:#999;font-family:'Fredoka One',cursive;font-size:15px;">✕</button>
      </div>`;
    document.getElementById("new-profile-name").focus();
    document.getElementById("confirm-add-profile").addEventListener("click", () => {
      const name = document.getElementById("new-profile-name").value.trim();
      if (!name) return;
      const profiles = getProfiles();
      if (!profiles.includes(name)) { profiles.push(name); saveProfiles(profiles); }
      render();
    });
    document.getElementById("cancel-add-profile").addEventListener("click", () => render());
  });
}

// ── Stars ─────────────────────────────────────────────────────────────────────
function renderStars() {
  return [...Array(24)].map(() => {
    const w = Math.random()*6+2, dur = Math.random()*3+2, del = Math.random()*3, hue = Math.random()*60+30;
    return `<div class="star" style="width:${w}px;height:${w}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:hsl(${hue},100%,80%);opacity:${Math.random()*0.4+0.1};--dur:${dur}s;--del:${del}s;z-index:0;"></div>`;
  }).join("");
}

// ── Main App ──────────────────────────────────────────────────────────────────
function renderApp() {
  const isWish = state.activeTab === "wishlist";
  const activePins = isWish ? state.wishlist : state.pins;
  const q = state.search.toLowerCase();
  const filtered = activePins.filter(p =>
    (!q || p.name.toLowerCase().includes(q) || (p.series||"").toLowerCase().includes(q) || (p.description||"").toLowerCase().includes(q))
    && (state.filterRarity === "All" || p.rarity === state.filterRarity)
    && (state.filterSeries === "All" || p.series === state.filterSeries)
  );
  const seriesList = ["All", ...Array.from(new Set(activePins.map(p => p.series).filter(Boolean)))];
  const stats = {
    total: state.pins.length,
    grails: state.pins.filter(p => p.rarity === "Grail").length,
    limited: state.pins.filter(p => p.rarity === "Limited Edition").length,
    series: new Set(state.pins.map(p => p.series)).size,
  };

  const syncColor = state.syncStatus === "synced" ? "#7de8a0" : state.syncStatus === "error" ? "#ff6b6b" : "#f5a623";
  const syncLabel = state.syncStatus === "synced" ? "Synced" : state.syncStatus === "error" ? "Offline" : "Syncing...";

  const seriesOptions = seriesList.map(s => `<option value="${s}" ${state.filterSeries===s?"selected":""}>${s}</option>`).join("");
  const rarityOptions = `<option value="All" ${state.filterRarity==="All"?"selected":""}>All Rarities</option>` + RARITIES.map(r => `<option value="${r}" ${state.filterRarity===r?"selected":""}>${r}</option>`).join("");

  const pinCards = filtered.map((pin, i) => renderPinCard(pin, isWish, i)).join("");
  const emptyMsg = filtered.length === 0 && activePins.length > 0
    ? `<div style="grid-column:1/-1;text-align:center;padding:60px;color:#aaa;font-style:italic;">No pins match your search ✨</div>` : "";
  const wishEmpty = isWish && state.wishlist.length === 0 ? `
    <div style="max-width:900px;margin:0 auto;padding:0 20px 20px;">
      <div style="background:linear-gradient(135deg,#fffbf0,#fff0fa);border-radius:20px;padding:32px 24px;text-align:center;border:2px dashed #f5a62366;">
        <div style="font-size:44px;margin-bottom:12px;">🌟</div>
        <div class="fredoka" style="font-size:22px;color:#f5a623;margin-bottom:8px;">Your wish list is empty</div>
        <div style="font-size:14px;color:#aaa;font-style:italic;line-height:1.6;">Add pins you're hunting for! When you find one,<br>flip the card and tap "Got it!" to move it to your collection.</div>
      </div>
    </div>` : "";

  return `
    ${renderStars()}
    <div style="min-height:100vh;position:relative;z-index:1;">
      <div style="background:linear-gradient(90deg,#ff6b9d,#f5a623,#6db8f7,#7de8a0);height:4px;"></div>
      <div style="background:white;box-shadow:0 4px 20px rgba(0,0,0,.05);width:100%;">
        <div style="max-width:900px;margin:0 auto;padding:24px 24px 18px;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;">
          <button id="switch-user-btn" style="position:absolute;top:18px;right:16px;padding:6px 14px;border-radius:20px;border:2px solid #e5e7eb;background:white;color:#aaa;font-family:'Fredoka One',cursive;font-size:12px;display:flex;align-items:center;gap:5px;">
            👤 ${state.user} <span style="font-size:10px;color:#ccc;">▾</span>
          </button>
          <div style="position:absolute;top:22px;left:16px;display:flex;align-items:center;gap:5px;font-size:12px;color:${syncColor};">
            <span class="sync-dot" style="background:${syncColor};"></span>${syncLabel}
          </div>
          <div class="fredoka" style="font-size:34px;background:linear-gradient(90deg,#ff6b9d,#f5a623,#6db8f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.15;margin-top:4px;">✨ My Pin Collection ✨</div>
          <div style="font-size:13px;color:#ccc;font-style:italic;margin-top:5px;">Tap a card to flip it</div>
          <div style="display:flex;justify-content:center;align-items:center;gap:24px;margin-top:16px;flex-wrap:wrap;">
            ${[{l:"Total Pins",v:stats.total,c:"#6db8f7"},{l:"Grails",v:stats.grails,c:"#ff6b9d"},{l:"Limited Ed.",v:stats.limited,c:"#f5a623"},{l:"Series",v:stats.series,c:"#7de8a0"}].map(s =>
              `<div style="text-align:center;"><div class="fredoka" style="font-size:28px;color:${s.c};line-height:1;">${s.v}</div><div style="font-size:10px;color:#bbb;letter-spacing:.5px;margin-top:3px;text-transform:uppercase;">${s.l}</div></div>`
            ).join("")}
          </div>
        </div>
      </div>

      <div style="display:flex;border-bottom:2px solid #f0f0f0;background:white;max-width:900px;margin:0 auto;padding:0 20px;">

          📌 My Collection <span style="background:${!isWish?"#4e9af122":"#f0f0f0"};color:${!isWish?"#4e9af1":"#bbb"};border-radius:999px;font-size:12px;font-weight:700;padding:1px 8px;">${state.pins.length}</span>

function renderPinCard(pin, isWish, idx) {

  const wishBadge = isWish ? `<div style="position:absolute;top:10px;right:12px;font-size:16px;">🌟</div>` : "";
  const backBtns = isWish
    ? `<button class="card-move-btn" data-id="${pin.id}" style="flex:2;padding:6px 0;border-radius:10px;border:none;background:#7de8a0;color:white;font-weight:700;font-size:11px;font-family:'Fredoka One',cursive;">Got it! Move to Collection</button>

      <div class="card-inner" id="card-inner-${pin.id}">
        <div class="card-face" style="background:white;box-shadow:0 8px 32px ${pin.color||"#6db8f7"}55,0 2px 8px rgba(0,0,0,.1);border:3px solid ${pin.color||"#6db8f7"};display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:16px;">

          <div class="fredoka" style="font-size:16px;color:#222;text-align:center;line-height:1.3;">${pin.name}</div>
          <div style="background:${rc}33;color:${rc};border:1.5px solid ${rc};border-radius:999px;font-size:11px;font-weight:700;padding:3px 12px;">${pin.rarity}</div>

          <div style="font-size:11px;color:#ccc;">tap to flip</div>
        </div>
        <div class="card-face card-back" style="background:linear-gradient(135deg,${pin.color||"#6db8f7"}22,white);box-shadow:0 8px 32px ${pin.color||"#6db8f7"}55;border:3px solid ${pin.color||"#6db8f7"};padding:18px;display:flex;flex-direction:column;gap:8px;">
          <div class="fredoka" style="font-size:15px;color:#333;">${pin.name}</div>

          <div style="display:flex;flex-direction:column;gap:5px;">
            ${!isWish ? `<div style="display:flex;justify-content:space-between;font-size:12px;"><span style="color:#999;">Condition</span><span style="color:#333;font-weight:600;">${pin.condition||"Mint"}</span></div>` : ""}

      </div>
    </div>`;
}

    return `<div class="search-result" data-name="${pin.name}" style="padding:12px 14px;border-radius:14px;border:2px solid ${isSel?"#6db8f7":"#e5e7eb"};background:${isSel?"#f0f8ff":"white"};cursor:pointer;display:flex;gap:12px;align-items:center;margin-bottom:8px;">
      <span style="font-size:28px;">${pin.emoji}</span>
      <div style="flex:1;"><div class="fredoka" style="font-size:14px;color:#333;">${pin.name}</div><div style="font-size:12px;color:#999;font-style:italic;">${pin.series}</div></div>
      <span style="background:${rc2}22;color:${rc2};border:1.5px solid ${rc2};border-radius:999px;font-size:10px;font-weight:700;padding:2px 8px;white-space:nowrap;">${pin.rarity}</span>

        <div>

          <div style="font-size:12px;color:#999;font-style:italic;">${sel.series}</div>
          <span style="background:${rc}22;color:${rc};border:1.5px solid ${rc};border-radius:999px;font-size:11px;font-weight:700;padding:2px 10px;">${sel.rarity}</span>

        <input id="db-search-input" value="${state.searchQuery}" placeholder="e.g. Belle, Hidden Mickey, Goofy..." style="width:100%;padding:12px 16px;border-radius:14px;border:2px solid #6db8f7;font-size:15px;margin-bottom:14px;"/>
        <div id="search-results-list">${results}</div>
        ${state.searchResults.length === 0 && state.searchQuery.length > 1 ? `<div style="text-align:center;color:#bbb;font-style:italic;padding:20px 0;">No pins found. Try a different keyword.</div>` : ""}

          <button id="search-cancel-btn" style="flex:1;padding:11px 0;border-radius:12px;border:none;background:#eee;color:#666;font-size:14px;">Cancel</button>
          <button id="search-use-btn" ${!sel?"disabled":""} style="flex:2;padding:11px 0;border-radius:12px;border:none;background:${sel?"linear-gradient(90deg,#ff6b9d,#f5a623)":"#eee"};color:${sel?"white":"#aaa"};font-size:15px;">${forWish?"Add to Wish List 🌟":"Use This Pin ✨"}</button>
        </div>
        <div style="margin-top:14px;padding:10px 14px;background:#f8f8f8;border-radius:12px;font-size:12px;color:#aaa;">💡 Don't see your pin? Add it manually with the form.</div>
      </div>
    </div>`;
}

  return `
    <div class="modal-overlay" id="form-modal">
      <div class="modal-box">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">

          ${!isEdit?`<button id="form-open-search" style="padding:7px 14px;border-radius:20px;border:2px solid #6db8f7;background:#e8f4ff;color:#4e9af1;font-size:13px;">🔍 Search DB</button>`:""}

            <div><label style="${lbl}">CONDITION</label><select id="f-cond" style="${inp}">${conOpts}</select></div>
          </div>
          <div><label style="${lbl}">PINPICS URL (optional)</label><input id="f-ppurl" value="${esc(f.pinpicsUrl||"")}" placeholder="https://pinpics.com/pins/..." style="${inp}"/></div>

function esc(s) { return (s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }

// ── Event Binding ─────────────────────────────────────────────────────────────
function bindAppEvents() {
  // Flip cards
  document.querySelectorAll(".card-scene").forEach(scene => {
    scene.addEventListener("click", e => {
      if (e.target.closest("button") || e.target.closest("a")) return;
      const id = scene.dataset.id;
      const inner = document.getElementById("card-inner-" + id);
      if (inner) inner.classList.toggle("flipped");
    });
  });

  // Tab switch
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      state.activeTab = btn.dataset.tab;
      state.search = ""; state.filterRarity = "All"; state.filterSeries = "All";
      render();
    });
  });

  // Switch user
  document.getElementById("switch-user-btn")?.addEventListener("click", () => {
    state.unsub.forEach(u => u()); state.unsub = [];
    state.screen = "profile"; state.user = null;
    localStorage.removeItem("pinapp_lastuser");
    render();
  });

  // Search / filter
  document.getElementById("search-input")?.addEventListener("input", e => { state.search = e.target.value; render(); });
  document.getElementById("rarity-filter")?.addEventListener("change", e => { state.filterRarity = e.target.value; render(); });
  document.getElementById("series-filter")?.addEventListener("change", e => { state.filterSeries = e.target.value; render(); });

  // Open DB search
  document.getElementById("open-db-search")?.addEventListener("click", () => {
    state.showSearch = true; state.searchQuery = ""; state.searchResults = []; state.searchSelected = null; render();
  });
  // Open wish search
  document.getElementById("add-wish-btn")?.addEventListener("click", () => {
    state.showWishSearch = true; state.searchQuery = ""; state.searchResults = []; state.searchSelected = null; render();
  });
  // Add pin form
  document.getElementById("add-pin-btn")?.addEventListener("click", () => {
    state.editing = null; state.prefill = null;
    state.formData = {name:"",description:"",series:"",rarity:"Common",condition:"Mint",photo:null,emoji:"📌",color:"#6db8f7",pinpicsUrl:""};
    state.showForm = true; render();
  });

  // Edit buttons
  document.querySelectorAll(".card-edit-btn").forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      const pin = state.pins.find(p => p.id === btn.dataset.id);
      if (pin) { state.editing = pin.id; state.formData = {...pin}; state.showForm = true; render(); }
    });
  });

  // Delete buttons
  document.querySelectorAll(".card-del-btn").forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      if (confirm("Remove this pin?")) removePin(btn.dataset.id, btn.dataset.col);
    });
  });

  // Move to collection
  document.querySelectorAll(".card-move-btn").forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      const pin = state.wishlist.find(p => p.id === btn.dataset.id);
      if (pin) {
        const newPin = {...pin, id: genId(), condition:"Mint", type:"pin"};
        delete newPin.owner;
        savePin(newPin, "pins");
        removePin(pin.id, "wishlist");
      }
    });
  });

  bindSearchModal();
  bindFormEvents();
}

function bindSearchModal() {
  const forWish = state.showWishSearch;

  document.getElementById("db-search-input")?.addEventListener("input", e => {
    state.searchQuery = e.target.value;
    state.searchResults = searchPins(state.searchQuery);
    state.searchSelected = null;
    render(); bindSearchModal();
    // Refocus
    const inp = document.getElementById("db-search-input");
    if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
  });

  document.querySelectorAll(".search-result").forEach(el => {
    el.addEventListener("click", () => {
      state.searchSelected = PIN_DB.find(p => p.name === el.dataset.name) || null;
      render(); bindSearchModal();
    });
  });

  document.getElementById("search-cancel-btn")?.addEventListener("click", () => {
    state.showSearch = false; state.showWishSearch = false; render();
  });

  document.getElementById("search-use-btn")?.addEventListener("click", () => {
    if (!state.searchSelected) return;
    const sel = state.searchSelected;
    const pin = {id:genId(), name:sel.name, description:sel.description, series:sel.series, rarity:sel.rarity, emoji:sel.emoji, condition:"Mint", photo:null, color:"#6db8f7", pinpicsUrl:"", type: forWish?"wish":"pin"};
    if (forWish) {
      savePin(pin, "wishlist");
      state.showWishSearch = false;
    } else {
      state.prefill = pin;
      state.formData = {...pin};
      state.editing = null;
      state.showSearch = false;
      state.showForm = true;
    }
    render();
  });

  // Click outside to close
  document.getElementById("search-modal")?.addEventListener("click", e => {
    if (e.target.id === "search-modal") { state.showSearch = false; state.showWishSearch = false; render(); }
  });
}

function bindFormEvents() {
  if (!state.showForm) return;
  const f = () => state.formData;

  const sync = () => {
    state.formData.name = document.getElementById("f-name")?.value || "";
    state.formData.description = document.getElementById("f-desc")?.value || "";
    state.formData.series = document.getElementById("f-series")?.value || "";
    state.formData.rarity = document.getElementById("f-rarity")?.value || "Common";
    state.formData.condition = document.getElementById("f-cond")?.value || "Mint";
    state.formData.pinpicsUrl = document.getElementById("f-ppurl")?.value || "";
    const urlVal = document.getElementById("f-photo-url")?.value || "";
    if (urlVal.startsWith("http")) state.formData.photo = urlVal;
  };

  ["f-name","f-desc","f-series","f-ppurl"].forEach(id => {
    document.getElementById(id)?.addEventListener("input", sync);
  });
  ["f-rarity","f-cond"].forEach(id => {
    document.getElementById(id)?.addEventListener("change", sync);
  });
  document.getElementById("f-photo-url")?.addEventListener("input", e => {
    sync();
    if (e.target.value.startsWith("http")) { state.formData.photo = e.target.value; render(); }
  });

  document.querySelectorAll(".color-dot").forEach(dot => {
    dot.addEventListener("click", () => { sync(); state.formData.color = dot.dataset.color; render(); });
  });
  document.querySelectorAll(".emoji-pick").forEach(ep => {
    ep.addEventListener("click", () => { sync(); state.formData.emoji = ep.dataset.emoji; render(); });
  });

  document.getElementById("f-upload-btn")?.addEventListener("click", () => document.getElementById("f-file-input")?.click());
  document.getElementById("f-remove-photo")?.addEventListener("click", () => { sync(); state.formData.photo = null; render(); });
  document.getElementById("f-file-input")?.addEventListener("change", e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => { sync(); state.formData.photo = ev.target.result; render(); };
    reader.readAsDataURL(file);
  });

  document.getElementById("form-open-search")?.addEventListener("click", () => {
    sync(); state.showSearch = true; state.showForm = false; state.searchQuery = ""; state.searchResults = []; state.searchSelected = null; render();
  });

  document.getElementById("form-cancel-btn")?.addEventListener("click", () => {
    state.showForm = false; state.editing = null; state.prefill = null; state.formData = null; render();
  });

  document.getElementById("form-save-btn")?.addEventListener("click", () => {
    sync();
    if (!state.formData.name.trim()) return;
    const pin = {...state.formData, id: state.editing || genId(), type:"pin"};
    savePin(pin, "pins");
    state.showForm = false; state.editing = null; state.prefill = null; state.formData = null;
    render();
  });

  document.getElementById("form-modal")?.addEventListener("click", e => {
    if (e.target.id === "form-modal") { state.showForm = false; state.editing = null; state.prefill = null; state.formData = null; render(); }
  });
}

// ── Boot ──────────────────────────────────────────────────────────────────────
async function boot() {
  render();
  if (state.user) subscribeUser(state.user);

  // Seed sample pins for Rey if first launch
  const reyKey = "pinapp_seeded_Rey";
  if (!localStorage.getItem(reyKey)) {
    localStorage.setItem(reyKey, "1");
    // Subscribe first, then seed after short delay
    setTimeout(async () => {
      if (state.pins.length === 0 && state.user === "Rey") {
        for (const pin of SAMPLE_PINS) {
          await savePin({...pin, type:"pin"}, "pins");
        }
      }
    }, 2000);
  }
}

boot();
</script>

<div id="root" style="position:relative;"></div>
</body>
</html>
